services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ai-crew
      POSTGRES_PASSWORD: ai-crew
      POSTGRES_DB: ai-crew
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ai-crew" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        AI_CREW_PIP_INDEX_URL: ${AI_CREW_PIP_INDEX_URL:-}
        AI_CREW_PIP_TRUSTED_HOST: ${AI_CREW_PIP_TRUSTED_HOST:-}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8008}:8000"
    command: ["/bin/bash", "/app/entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql+asyncpg://ai-crew:ai-crew@postgres:5432/ai-crew
      REDIS_URL: redis://redis:6379/0
      AGENT_DATA_DIR: /data/agents
      AGENT_TEMPLATE_DIR: /app/agent_template
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret}
      CORS_ORIGINS: '["*"]'
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      DOCKER_NETWORK: ai-crew_network
      # GitHub personal access token — fallback for AIHub/GitHub skill imports
      # when no tenant-level token is configured. Raises API rate limit from 60 to 5,000/hr.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SS_CONFIG_FILE: /data/ss-nodes.json
    volumes:
      - ./backend:/app
      - ./backend/agent_data:/data/agents
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ss-nodes.json:/data/ss-nodes.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3008}:3000"
    environment:
      VITE_API_URL: http://localhost:8008
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:


networks:
  default:
    name: ai-crew_network
